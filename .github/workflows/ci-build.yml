name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  productNamespacePrefix: "Splat"
  
# Needed so the reusable workflow can optionally delete the temp per-OS artifacts it creates.
permissions:
  contents: read
  actions: write

jobs:
  build:
    uses: reactiveui/actions-common/.github/workflows/workflow-common-setup-and-build.yml@4a1a5f6a413a8de27f324109dc17f2fc659dbcfd # main
    with:
      productNamespacePrefix: Splat
      installWorkloads: true
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

